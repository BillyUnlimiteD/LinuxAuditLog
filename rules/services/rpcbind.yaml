id: SVC-RPCBIND-001
title: RPC bind port mapper service events
category: service
subcategory: rpcbind
mitre_technique: T1021.005
mitre_tactic: lateral_movement
severity: medium
confidence: medium
enabled: true
description: Detects RPC bind (port mapper) service events including registration failures, access control issues, and potential RPC service enumeration attempts.
service: rpcbind
detection:
  type: pattern
  patterns:
    - regex: 'rpcbind.*: connect from.*denied'
    - regex: 'rpcbind.*: refused connect from'
    - regex: 'rpcbind.*: Failed to register'
    - regex: 'rpcbind.*: Cannot register service'
    - regex: 'rpcbind.*: Authentication failed'
false_positives:
  - Normal RPC service registrations
  - Expected connection denials in firewalled environments
recommendation: >
  1. Review RPC bind connection attempts for unauthorized access.
  2. Ensure rpcbind is firewalled and only accessible to trusted networks.
  3. Monitor for RPC service enumeration attempts.
  4. Consider disabling rpcbind if RPC services are not needed.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/system_administrators_guide/ch-tigervnc
  - https://attack.mitre.org/techniques/T1021/005/
tags:
  - rpcbind
  - rpc
  - port_mapper
  - audit
