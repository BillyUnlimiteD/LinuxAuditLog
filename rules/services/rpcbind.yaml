id: SVC-RPCBIND-001
title: RPC bind port mapper service events
category: service
subcategory: rpcbind
mitre_technique: T1021.005
mitre_tactic: lateral_movement
severity: medium
confidence: medium
enabled: true
description: Detecta eventos del servicio RPC bind (mapeador de puertos) incluyendo fallos de registro, problemas de control de acceso y posibles intentos de enumeración de servicios RPC.
service: rpcbind
detection:
  type: pattern
  patterns:
    - regex: 'rpcbind.*: connect from.*denied'
    - regex: 'rpcbind.*: refused connect from'
    - regex: 'rpcbind.*: Failed to register'
    - regex: 'rpcbind.*: Cannot register service'
    - regex: 'rpcbind.*: Authentication failed'
false_positives:
  - Registros normales de servicios RPC
  - Denegaciones esperadas de conexión en entornos con firewall
recommendation: >
  1. Revisar intentos de conexión RPC bind para acceso no autorizado.
  2. Asegurar que rpcbind esté protegido por firewall y solo accesible a redes de confianza.
  3. Monitorear intentos de enumeración de servicios RPC.
  4. Considerar deshabilitar rpcbind si no se necesitan servicios RPC.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/system_administrators_guide/ch-tigervnc
  - https://attack.mitre.org/techniques/T1021/005/
tags:
  - rpcbind
  - rpc
  - port_mapper
  - audit
