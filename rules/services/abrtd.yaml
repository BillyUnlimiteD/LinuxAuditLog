id: SVC-ABRTD-001
title: ABRT daemon crash reporting and service activity
category: service
subcategory: abrtd
mitre_technique: T1543.003
mitre_tactic: persistence
severity: medium
confidence: medium
enabled: true
description: Detects ABRT (Automatic Bug Reporting Tool) daemon activity including crash detections, service failures, and potential abuse for information disclosure or persistence.
service: abrtd
detection:
  type: pattern
  patterns:
    - regex: 'abrtd.*:.*New crash dump created'
    - regex: 'abrtd.*:.*Deleting problem directory'
    - regex: 'abrtd.*:.*Problem directory.*already exists'
    - regex: 'abrtd.*:.*Directory.*creation failed'
    - regex: 'abrtd.*:.*Failed to create dump dir'
    - regex: 'abrtd.*:.*Failed to chown dump dir'
false_positives:
  - Normal crash reporting during software testing or development
  - Expected application crashes in unstable environments
recommendation: >
  1. Review crash reports generated by ABRT for sensitive information disclosure.
  2. Ensure ABRT is configured to not upload crash data to external servers without authorization.
  3. Monitor for unusual crash patterns that may indicate exploitation attempts.
  4. Disable ABRT in production environments if not required.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/developer_guide/sect-abrt
  - https://attack.mitre.org/techniques/T1543/003/
tags:
  - abrtd
  - crash_reporting
  - audit
  - service_failure
