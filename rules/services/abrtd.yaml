id: SVC-ABRTD-001
title: ABRT daemon crash reporting and service activity
category: service
subcategory: abrtd
mitre_technique: T1543.003
mitre_tactic: persistence
severity: medium
confidence: medium
enabled: true
description: Detecta actividad del daemon ABRT (Herramienta Automática de Reporte de Bugs) incluyendo detecciones de fallos, fallos de servicio y posible abuso para divulgación de información o persistencia.
service: abrtd
detection:
  type: pattern
  patterns:
    - regex: 'abrtd.*:.*New crash dump created'
    - regex: 'abrtd.*:.*Deleting problem directory'
    - regex: 'abrtd.*:.*Problem directory.*already exists'
    - regex: 'abrtd.*:.*Directory.*creation failed'
    - regex: 'abrtd.*:.*Failed to create dump dir'
    - regex: 'abrtd.*:.*Failed to chown dump dir'
false_positives:
  - Reportes normales de fallos durante pruebas de software o desarrollo
  - Fallos esperados de aplicaciones en entornos inestables
recommendation: >
  1. Revisar reportes de fallos generados por ABRT para divulgación de información sensible.
  2. Asegurar que ABRT esté configurado para no subir datos de fallos a servidores externos sin autorización.
  3. Monitorear patrones inusuales de fallos que puedan indicar intentos de explotación.
  4. Deshabilitar ABRT en entornos de producción si no es requerido.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/developer_guide/sect-abrt
  - https://attack.mitre.org/techniques/T1543/003/
tags:
  - abrtd
  - crash_reporting
  - audit
  - service_failure
