id: SVC-FCOEMON-001
title: FCoE daemon service failures and configuration changes
category: service
subcategory: fcoemon
mitre_technique: T1543.003
mitre_tactic: persistence
severity: low
confidence: medium
enabled: true
description: Detects FCoE (Fibre Channel over Ethernet) daemon service events including failures, configuration changes, and interface issues that may affect storage connectivity.
service: fcoemon
detection:
  type: pattern
  patterns:
    - regex: 'fcoemon.*:.*Failed to'
    - regex: 'fcoemon.*:.*Error'
    - regex: 'fcoemon.*:.*Interface.*down'
    - regex: 'fcoemon.*:.*VLAN.*creation failed'
    - regex: 'fcoemon.*:.*DCB.*not supported'
    - regex: 'fcoemon.*:.*FIP.*timeout'
false_positives:
  - Normal network interface changes during maintenance
  - Expected failures in unstable network environments
recommendation: >
  1. Review FCoE interface status and connectivity issues.
  2. Ensure FCoE configuration is secure and not exposing storage to unauthorized networks.
  3. Monitor for unusual FCoE interface creations or deletions.
  4. Verify DCB (Data Center Bridging) settings are appropriate.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/storage_administration_guide/fcoe-config
  - https://attack.mitre.org/techniques/T1543/003/
tags:
  - fcoemon
  - fcoe
  - storage
  - network
  - audit
