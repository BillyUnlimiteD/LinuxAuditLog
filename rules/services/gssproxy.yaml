id: SVC-GSSPROXY-001
title: GSS-API proxy daemon authentication events
category: service
subcategory: gssproxy
mitre_technique: T1550
mitre_tactic: defense_evasion
severity: medium
confidence: medium
enabled: true
description: Detecta eventos del daemon proxy GSS-API incluyendo fallos de autenticación, problemas de credenciales y posibles problemas de seguridad relacionados con Kerberos.
service: gssproxy
detection:
  type: pattern
  patterns:
    - regex: 'gssproxy.*: Authentication failed'
    - regex: 'gssproxy.*: Credential validation failed'
    - regex: 'gssproxy.*: GSSAPI error'
    - regex: 'gssproxy.*: Failed to acquire credentials'
    - regex: 'gssproxy.*: Principal not found'
false_positives:
  - Fallos normales de autenticación durante problemas de red
  - Problemas esperados de credenciales en entornos mal configurados
recommendation: >
  1. Revisar fallos de autenticación GSS-API en busca de intentos de acceso no autorizado.
  2. Asegurar que la configuración de Kerberos sea segura y las credenciales estén correctamente gestionadas.
  3. Monitorear patrones inusuales de adquisición de credenciales.
  4. Verificar que el proxy GSS no exponga datos sensibles de autenticación.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/system-level_authentication_guide/gss-proxy
  - https://attack.mitre.org/techniques/T1550/
tags:
  - gssproxy
  - kerberos
  - authentication
  - audit
