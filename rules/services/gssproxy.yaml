id: SVC-GSSPROXY-001
title: GSS-API proxy daemon authentication events
category: service
subcategory: gssproxy
mitre_technique: T1550
mitre_tactic: defense_evasion
severity: medium
confidence: medium
enabled: true
description: Detects GSS-API proxy daemon events including authentication failures, credential issues, and potential Kerberos-related security problems.
service: gssproxy
detection:
  type: pattern
  patterns:
    - regex: 'gssproxy.*: Authentication failed'
    - regex: 'gssproxy.*: Credential validation failed'
    - regex: 'gssproxy.*: GSSAPI error'
    - regex: 'gssproxy.*: Failed to acquire credentials'
    - regex: 'gssproxy.*: Principal not found'
false_positives:
  - Normal authentication failures during network issues
  - Expected credential issues in misconfigured environments
recommendation: >
  1. Review GSS-API authentication failures for unauthorized access attempts.
  2. Ensure Kerberos configuration is secure and credentials are properly managed.
  3. Monitor for unusual credential acquisition patterns.
  4. Verify GSS proxy is not exposing sensitive authentication data.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/system-level_authentication_guide/gss-proxy
  - https://attack.mitre.org/techniques/T1550/
tags:
  - gssproxy
  - kerberos
  - authentication
  - audit
