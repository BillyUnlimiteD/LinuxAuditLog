id: SVC-LIBVIRTD-001
title: libvirt daemon virtualization management events
category: service
subcategory: libvirtd
mitre_technique: T1562.008
mitre_tactic: defense_evasion
severity: medium
confidence: medium
enabled: true
description: Detecta eventos del daemon libvirt incluyendo gestión de VMs, problemas de control de acceso e intentos potenciales de escape de virtualización o abuso.
service: libvirtd
detection:
  type: pattern
  patterns:
    - regex: 'libvirtd.*: Access denied'
    - regex: 'libvirtd.*: Authentication failed'
    - regex: 'libvirtd.*: Permission denied'
    - regex: 'libvirtd.*: Failed to start VM'
    - regex: 'libvirtd.*: Domain.*error'
false_positives:
  - Operaciones normales de gestión de VMs
  - Denegaciones esperadas de acceso en entornos restringidos
recommendation: >
  1. Revisar control de acceso de libvirt y fallos de autenticación.
  2. Asegurar que libvirt esté configurado con permisos apropiados y aislamiento de red.
  3. Monitorear intentos no autorizados de creación o modificación de VMs.
  4. Verificar que libvirt no exponga recursos del host a las VMs.
references:
  - https://libvirt.org/
  - https://attack.mitre.org/techniques/T1562/008/
tags:
  - libvirtd
  - virtualization
  - vm
  - audit
