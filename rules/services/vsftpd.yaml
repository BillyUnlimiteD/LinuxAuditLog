id: SVC-VSFTPD-001
title: vsftpd FTP server access and authentication events
category: service
subcategory: vsftpd
mitre_technique: T1078
mitre_tactic: initial_access
severity: medium
confidence: medium
enabled: true
description: Detecta eventos del servidor FTP vsftpd incluyendo logins fallidos, conexiones anónimas, transferencias de archivos y posibles intentos de fuerza bruta.
service: vsftpd
detection:
  type: pattern
  patterns:
    - regex: 'vsftpd.*: FAIL LOGIN'
    - regex: 'vsftpd.*: OK LOGIN'
    - regex: 'vsftpd.*: Client .* connected'
    - regex: 'vsftpd.*: ANON'
    - regex: 'vsftpd.*: UPLOAD'
    - regex: 'vsftpd.*: DELETE'
    - regex: 'vsftpd.*: Connection refused'
false_positives:
  - Uso normal de FTP en entornos legítimos
  - Acceso anónimo esperado si está configurado
recommendation: >
  1. Revisar intentos de login fallidos para patrones de fuerza bruta.
  2. Monitorear acceso FTP anónimo para compartición no autorizada de archivos.
  3. Asegurar que vsftpd esté configurado con autenticación fuerte y chroot.
  4. Deshabilitar acceso anónimo si no es requerido.
  5. Registrar todas las actividades FTP para análisis forense.
references:
  - https://security.appspot.com/vsftpd.html
  - https://attack.mitre.org/techniques/T1078/
tags:
  - vsftpd
  - ftp
  - authentication
  - file_transfer
  - audit
