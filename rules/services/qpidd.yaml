id: SVC-QPIDD-001
title: Qpid daemon messaging service activity and errors
category: service
subcategory: qpidd
mitre_technique: T1071
mitre_tactic: command_and_control
severity: medium
confidence: medium
enabled: true
description: Detecta actividad del daemon Qpid (qpidd) incluyendo intentos de conexión, fallos de autenticación y errores de servicio que puedan indicar mensajería no autorizada o actividad C2.
service: qpidd
detection:
  type: pattern
  patterns:
    - regex: 'qpidd.*:.*Connection from.*established'
    - regex: 'qpidd.*:.*Connection denied'
    - regex: 'qpidd.*:.*Authentication failed'
    - regex: 'qpidd.*:.*Broker.*error'
    - regex: 'qpidd.*:.*Failed to bind to port'
    - regex: 'qpidd.*:.*SASL authentication failed'
false_positives:
  - Tráfico normal de mensajería en entornos que usan Qpid para propósitos legítimos
  - Fallos esperados de conexión durante problemas de red
recommendation: >
  1. Revisar logs de conexión de Qpid para direcciones IP no autorizadas o patrones de conexión inusuales.
  2. Asegurar que Qpid esté configurado con autenticación apropiada y controles de acceso.
  3. Monitorear colas de mensajes o tópicos inusuales siendo accedidos.
  4. Deshabilitar Qpid si no es requerido para la funcionalidad del sistema.
references:
  - https://qpid.apache.org/
  - https://attack.mitre.org/techniques/T1071/
tags:
  - qpidd
  - messaging
  - audit
  - service_error
