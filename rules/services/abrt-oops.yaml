id: SVC-ABRT_OOPS-001
title: ABRT oops handler kernel crash reporting
category: service
subcategory: abrt-oops
mitre_technique: T1543.003
mitre_tactic: persistence
severity: medium
confidence: medium
enabled: true
description: Detecta eventos del manejador de oops de ABRT para fallos del kernel y oops de espacio de usuario, que pueden indicar inestabilidad del sistema o intentos de explotación.
service: abrt-oops
detection:
  type: pattern
  patterns:
    - regex: 'abrt-oops.*: Reported .* oopses'
    - regex: 'abrt-oops.*: Kernel oops detected'
    - regex: 'abrt-oops.*: User space oops detected'
    - regex: 'abrt-oops.*: Failed to create problem directory'
    - regex: 'abrt-oops.*: Duplicate oops detected'
false_positives:
  - Fallos normales de oops del kernel durante pruebas o hardware inestable
  - Fallos esperados en entornos de desarrollo
recommendation: >
  1. Revisar reportes de oops del kernel en busca de signos de explotación o vulnerabilidades.
  2. Asegurar que ABRT esté configurado de forma segura y no exponga datos sensibles de fallos.
  3. Monitorear oops repetidos que puedan indicar problemas persistentes.
  4. Actualizar kernel y software para abordar causas conocidas de fallos.
references:
  - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/developer_guide/sect-abrt
  - https://attack.mitre.org/techniques/T1543/003/
tags:
  - abrt-oops
  - kernel
  - crash
  - audit
