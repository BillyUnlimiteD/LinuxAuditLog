id: SIGMA-WEB-HACK_TOOL_USER_AGENT
title: Hack Tool User Agent
category: web
subcategory: detection
mitre_technique: T1190
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects suspicious user agent strings user by hack tools in proxy logs
service: '*'
detection:
  type: pattern
  patterns:
  - regex: \(hydra\)
  - regex: \ arachni/
  - regex: '\ BFAC\ '
  - regex: '\ brutus\ '
  - regex: '\ cgichk\ '
  - regex: core\-project/1\.0
  - regex: \ crimscanner/
  - regex: datacha0s
  - regex: dirbuster
  - regex: domino\ hunter
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_ua_hacktool.yml.
  References: https://github.com/fastly/waf_testbed/blob/8bfc406551f3045e418cbaad7596cff8da331dfc/templates/default/scanners-user-agents.data.erb,
  http://rules.emergingthreats.net/open/snort-2.9.0/rules/emerging-user_agents.rules'
references:
- https://github.com/fastly/waf_testbed/blob/8bfc406551f3045e418cbaad7596cff8da331dfc/templates/default/scanners-user-agents.data.erb
- http://rules.emergingthreats.net/open/snort-2.9.0/rules/emerging-user_agents.rules
tags:
- attack.initial-access
- attack.t1190
- attack.credential-access
- attack.t1110
_sigma_source: rules/web/proxy_generic/proxy_ua_hacktool.yml
_sigma_status: test
