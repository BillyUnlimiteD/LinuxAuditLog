id: SIGMA-WEB-HACKTOOL___EMPIRE_US
title: HackTool - Empire UserAgent URI Combo
category: web
subcategory: detection
mitre_technique: T1071.001
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects user agent and URI paths used by empire agents
service: '*'
detection:
  type: pattern
  patterns:
  - regex: Mozilla/5\.0\ \(Windows\ NT\ 6\.1;\ WOW64;\ Trident/7\.0;\ rv:11\.0\)\
      like\ Gecko
  - regex: /admin/get\.php
  - regex: /news\.php
  - regex: /login/process\.php
  - regex: POST
false_positives:
- Valid requests with this exact user agent to server scripts of the defined names
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_hktl_empire_ua_uri_patterns.yml.
  References: https://github.com/BC-SECURITY/Empire'
references:
- https://github.com/BC-SECURITY/Empire
tags:
- attack.defense-evasion
- attack.command-and-control
- attack.t1071.001
_sigma_source: rules/web/proxy_generic/proxy_hktl_empire_ua_uri_patterns.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2020-07-13
