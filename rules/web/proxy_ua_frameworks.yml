id: SIGMA-WEB-EXPLOIT_FRAMEWORK_US
title: Exploit Framework User Agent
category: web
subcategory: detection
mitre_technique: T1071.001
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects suspicious user agent strings used by exploit / pentest frameworks
  like Metasploit in proxy logs
service: '*'
detection:
  type: pattern
  patterns:
  - regex: Internet\ Explorer\ .*
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 6\.0;\ Windows\ NT\ 5\.1;\ SV1;\ InfoPath\.2\)
  - regex: Mozilla/4\.0\ \(compatible;\ Metasploit\ RSPEC\)
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 6\.1;\ Windows\ NT\)
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 6\.0;\ Windows\ NT\ 5\.1\)
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 7\.0;\ Windows\ NT\ 6\.0\)
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 8\.0;\ Windows\ NT\ 6\.0;\ Trident/4\.0\)
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 7\.0;\ Windows\ NT\ 6\.0;\ Trident/4\.0;\
      SIMBAR=\{7DB0F6DE\-8DE7\-4841\-9084\-28FA914B0F2E\};\ SLCC1;\ \.N
  - regex: Mozilla/5\.0\ \(compatible;\ Googlebot/2\.1;\ \+http://www\.google\.com/bot\.html\)
  - regex: Mozilla/5\.0\ \(Windows;\ U;\ Windows\ NT\ 5\.1;\ en\-US\)\ AppleWebKit/525\.13\
      \(KHTML,\ like\ Gecko\)\ Chrome/4\.0\.221\.6\ Safari/525\.13
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_ua_frameworks.yml.
  References: https://blog.didierstevens.com/2015/03/16/quickpost-metasploit-user-agent-strings/'
references:
- https://blog.didierstevens.com/2015/03/16/quickpost-metasploit-user-agent-strings/
tags:
- attack.command-and-control
- attack.t1071.001
_sigma_source: rules/web/proxy_generic/proxy_ua_frameworks.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2017-07-08
