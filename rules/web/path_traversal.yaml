id: WEB-002
title: Path Traversal Attempt
category: web
subcategory: file_access
mitre_technique: T1190
mitre_tactic: initial_access
severity: high
confidence: high
enabled: true
description: >
  Detects path traversal (directory traversal) attempts in web server access logs.
  Attackers use sequences like "../" to escape the web root and access arbitrary
  files on the server (e.g., /etc/passwd, /etc/shadow, application config files).
  URL-encoded variants (%2e%2e%2f, %252e) are also covered.
service: "*"
detection:
  type: pattern
  patterns:
    - regex: "(?P<src_ip>[\\d.]+).*\"(?:GET|POST) (?P<uri>[^\"]*(?:\\.\\./|\\.\\.\\\\/|%2e%2e%2f|%2e%2e/|\\.%2e/|%2e\\./|%252e%252e|\\.\\.%c0%af)[^\"]*)\""
    - regex: "(?P<src_ip>[\\d.]+).*\"(?:GET|POST) (?P<uri>[^\"]*(?:/etc/passwd|/etc/shadow|/etc/hosts|/proc/self|/var/www|/home/\\w+/\\.ssh)[^\"]*)\""
    - regex: "(?P<src_ip>[\\d.]+).*\"(?:GET|POST) (?P<uri>[^\"]*(?:boot\\.ini|win\\.ini|system32|cmd\\.exe)[^\"]*)\""
false_positives:
  - Legitimate URLs containing ".." in non-traversal context (rare)
  - Security scanners performing authorized assessments
recommendation: >
  1. Determine whether the traversal was successful (HTTP 200 with file content).
  2. Check response body size — a successful /etc/passwd read returns ~2KB.
  3. Implement server-side path canonicalization and validation.
  4. Configure web server to reject requests with path traversal sequences.
  5. Ensure the web application runs with minimal filesystem permissions.
references:
  - "https://owasp.org/www-community/attacks/Path_Traversal"
  - "https://attack.mitre.org/techniques/T1190/"
tags:
  - path_traversal
  - file_access
  - web
  - owasp_a01
