id: SIGMA-WEB-CRYPTO_MINER_USER_AG
title: Crypto Miner User Agent
category: web
subcategory: detection
mitre_technique: T1071.001
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects suspicious user agent strings used by crypto miners in proxy
  logs
service: '*'
detection:
  type: pattern
  patterns:
  - regex: 'XMRig\ '
  - regex: ccminer
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_ua_cryptominer.yml.
