id: SIGMA-WEB-HACKTOOL___COBALTSTR
title: HackTool - CobaltStrike Malleable Profile Patterns - Proxy
category: web
subcategory: detection
mitre_technique: T1071.001
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects cobalt strike malleable profiles patterns (URI, User-Agents,
  Methods).
service: '*'
detection:
  type: pattern
  patterns:
  - regex: Mozilla/5\.0\ \(Windows\ NT\ 6\.1;\ WOW64;\ Trident/7\.0;\ rv:11\.0\)\
      like\ Gecko
  - regex: /s/ref=nb_sb_noss_1/167\-3294888\-0262949/field\-keywords=books
  - regex: www\.amazon\.com
  - regex: =csm\-hit=s\-24KU11BB82RZSYGJ3BDK\|1419899012996
  - regex: Mozilla/5\.0\ \(Windows\ NT\ 6\.1;\ WOW64;\ Trident/7\.0;\ rv:11\.0\)\
      like\ Gecko
  - regex: POST
  - regex: /N4215/adj/amzn\.us\.sr\.aps
  - regex: www\.amazon\.com
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 6\.0;Windows\ NT\ 5\.1\)
  - regex: Mozilla/4\.0\ \(compatible;\ MSIE\ 7\.0;\ Windows\ NT\ 6\.1;\ WOW64;\ Trident/4\.0;\
      SLCC2;\ \.NET\ CLR\ 3\.0\.30729;\ \.NET4\.0C;\ \.NET4\.0E\ \)
false_positives:
- Unknown
