id: SIGMA-WEB-SUSPICIOUS_BASE___EN
title: Suspicious Base64 Encoded User-Agent
category: web
subcategory: detection
mitre_technique: T1071.001
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects suspicious encoded User-Agent strings, as seen used by some malware.
service: '*'
detection:
  type: pattern
  patterns:
  - regex: Q2hyb21l
  - regex: QXBwbGVXZWJLaX
  - regex: RGFsdmlr
  - regex: TW96aWxsY
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_ua_base64_encoded.yml.
  References: https://deviceatlas.com/blog/list-of-user-agent-strings#desktop'
references:
- https://deviceatlas.com/blog/list-of-user-agent-strings#desktop
tags:
- attack.command-and-control
- attack.t1071.001
_sigma_source: rules/web/proxy_generic/proxy_ua_base64_encoded.yml
_sigma_status: test
_sigma_author: Nasreddine Bencherchali (Nextron Systems)
_sigma_date: 2023-05-04
