id: SIGMA-WEB-APACHE_THREADING_ERR
title: Apache Threading Error
category: web
subcategory: detection
mitre_technique: T1190
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects an issue in apache logs that reports threading related errors
service: apache
detection:
  type: pattern
  patterns:
  - regex: __pthread_tpp_change_priority:\ Assertion\ `new_prio\ ==\ \-1\ \|\|\ \(new_prio\
      >=\ fifo_min_prio\ \&\&\ new_prio\ <=\ fifo_max_prio\)
false_positives:
- 3rd party apache modules - https://bz.apache.org/bugzilla/show_bug.cgi?id=46185
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/product/apache/web_apache_threading_error.yml.
  References: https://github.com/hannob/apache-uaf/blob/da40f2be3684c8095ec6066fa68eb5c07a086233/README.md'
references:
- https://github.com/hannob/apache-uaf/blob/da40f2be3684c8095ec6066fa68eb5c07a086233/README.md
tags:
- attack.initial-access
- attack.lateral-movement
- attack.t1190
- attack.t1210
_sigma_source: rules/web/product/apache/web_apache_threading_error.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2019-01-22
