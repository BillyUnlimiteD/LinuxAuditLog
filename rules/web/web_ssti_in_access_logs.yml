id: SIGMA-WEB-SERVER_SIDE_TEMPLATE
title: Server Side Template Injection Strings
category: web
subcategory: detection
mitre_technique: T1221
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects SSTI attempts sent via GET requests in access logs
service: '*'
detection:
  type: pattern
  patterns:
  - regex: =%7B%7B
  - regex: =\$%7B
  - regex: =<%=
  - regex: =%3C%25=
  - regex: freemarker\.template\.utility\.Execute
  - regex: \.getClass\(\)\.forName\('javax\.script\.ScriptEngineManager'\)
  - regex: T\(org\.apache\.commons\.io\.IOUtils\)
false_positives:
- User searches in search boxes of the respective website
- Internal vulnerability scanners can cause some serious FPs when used, if you experience
  a lot of FPs due to this think of adding more filters such as "User Agent" strings
  and more response codes
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/webserver_generic/web_ssti_in_access_logs.yml.
  References: https://book.hacktricks.xyz/pentesting-web/ssti-server-side-template-injection,
  https://github.com/payloadbox/ssti-payloads'
references:
- https://book.hacktricks.xyz/pentesting-web/ssti-server-side-template-injection
- https://github.com/payloadbox/ssti-payloads
tags:
- attack.defense-evasion
- attack.t1221
_sigma_source: rules/web/webserver_generic/web_ssti_in_access_logs.yml
_sigma_status: test
_sigma_author: Nasreddine Bencherchali (Nextron Systems)
_sigma_date: 2022-06-14
