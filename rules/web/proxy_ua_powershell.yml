id: SIGMA-WEB-WINDOWS_POWERSHELL_U
title: Windows PowerShell User Agent
category: web
subcategory: execution
mitre_technique: T1071.001
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects Windows PowerShell Web Access
service: '*'
detection:
  type: pattern
  patterns:
  - regex: \ WindowsPowerShell/
false_positives:
- Administrative scripts that download files from the Internet
- Administrative scripts that retrieve certain website contents
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_ua_powershell.yml.
