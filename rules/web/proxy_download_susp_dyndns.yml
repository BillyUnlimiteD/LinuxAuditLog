id: SIGMA-WEB-DOWNLOAD_FROM_SUSPIC
title: Download from Suspicious Dyndns Hosts
category: web
subcategory: detection
mitre_technique: T1105
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects download of certain file types from hosts with dynamic DNS names
  (selected list)
service: '*'
detection:
  type: pattern
  patterns:
  - regex: docm
  - regex: xlsm
  - regex: pptm
  - regex: \.hopto\.org
  - regex: \.no\-ip\.org
  - regex: \.no\-ip\.info
  - regex: \.no\-ip\.biz
  - regex: \.no\-ip\.com
  - regex: \.noip\.com
  - regex: \.ddns\.name
false_positives:
- Software downloads
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_download_susp_dyndns.yml.
  References: https://www.alienvault.com/blogs/security-essentials/dynamic-dns-security-and-potential-threats'
references:
- https://www.alienvault.com/blogs/security-essentials/dynamic-dns-security-and-potential-threats
tags:
- attack.defense-evasion
- attack.command-and-control
- attack.t1105
- attack.t1568
_sigma_source: rules/web/proxy_generic/proxy_download_susp_dyndns.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2017-11-08
