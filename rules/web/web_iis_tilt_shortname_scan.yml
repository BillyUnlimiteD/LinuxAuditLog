category: web
subcategory: detection
mitre_technique: T1190
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: When IIS uses an old .Net Framework it's possible to enumerate folders
  with the symbol "~"
service: '*'
detection:
  type: pattern
  patterns:
  - regex: a\.aspx
  - regex: OPTIONS
