id: SIGMA-WEB-TELEGRAM_API_ACCESS
title: Telegram API Access
category: web
subcategory: detection
mitre_technique: T1071.001
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects suspicious requests to Telegram API without the usual Telegram
  User-Agent
service: '*'
detection:
  type: pattern
  patterns:
  - regex: api\.telegram\.org
  - regex: Telegram
false_positives:
- Legitimate use of Telegram bots in the company
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/web/proxy_generic/proxy_telegram_api.yml.
  References: https://researchcenter.paloaltonetworks.com/2018/03/unit42-telerat-another-android-trojan-leveraging-telegrams-bot-api-to-target-iranian-users/,
  https://blog.malwarebytes.com/threat-analysis/2016/11/telecrypt-the-ransomware-abusing-telegram-api-defeated/,
  https://www.welivesecurity.com/2016/12/13/rise-telebots-analyzing-disruptive-killdisk-attacks/'
references:
- https://researchcenter.paloaltonetworks.com/2018/03/unit42-telerat-another-android-trojan-leveraging-telegrams-bot-api-to-target-iranian-users/
- https://blog.malwarebytes.com/threat-analysis/2016/11/telecrypt-the-ransomware-abusing-telegram-api-defeated/
- https://www.welivesecurity.com/2016/12/13/rise-telebots-analyzing-disruptive-killdisk-attacks/
tags:
- attack.defense-evasion
- attack.command-and-control
- attack.t1071.001
- attack.t1102.002
_sigma_source: rules/web/proxy_generic/proxy_telegram_api.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2018-06-05
