id: SIGMA-LIN-SUSPICIOUS_C__ACTIVI
title: Suspicious C2 Activities
category: audit
subcategory: detection
mitre_technique: ''
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: 'Detects suspicious activities as declared by Florian Roth in its ''Best
  Practice Auditd Configuration''.

  This includes the detection of the following commands; wget, curl, base64, nc, netcat,
  ncat, ssh, socat, wireshark, rawshark, rdesktop, nmap.

  These commands match a few techniques from the tactics "Command and Control", including
  not exhaustively the following; Application Layer Protocol (T1071), Non-Application
  Layer Protocol (T1095), Data Encoding (T1132)

  '
service: auditd
detection:
  type: pattern
  patterns:
  - regex: susp_activity
false_positives:
- Admin or User activity
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/lnx_auditd_susp_c2_commands.yml.
  References: https://github.com/Neo23x0/auditd'
references:
- https://github.com/Neo23x0/auditd
tags:
- attack.command-and-control
_sigma_source: rules/linux/auditd/lnx_auditd_susp_c2_commands.yml
_sigma_status: test
_sigma_author: Marie Euler
_sigma_date: 2020-05-18
