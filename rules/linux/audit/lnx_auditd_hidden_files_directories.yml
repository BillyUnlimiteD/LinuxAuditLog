id: SIGMA-LIN-HIDDEN_FILES_AND_DIR
title: Hidden Files and Directories
category: audit
subcategory: detection
mitre_technique: T1564.001
mitre_tactic: ''
severity: low
confidence: low
enabled: true
description: Detects adversary creating hidden file or directory, by detecting directories
  or files with . as the first character
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: mkdir
  - regex: nano
  - regex: touch
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_hidden_files_directories.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1564.001/T1564.001.md'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1564.001/T1564.001.md
tags:
- attack.defense-evasion
- attack.t1564.001
