id: SIGMA-LIN-SCREEN_CAPTURE_WITH
title: Screen Capture with Xwd
category: audit
subcategory: detection
mitre_technique: T1113
mitre_tactic: collection
severity: low
confidence: low
enabled: true
description: Detects adversary creating screen capture of a full with xwd. Highly
  recommended using rule on servers, due high usage of screenshot utilities on user
  workstations
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: \-root
  - regex: \-out
  - regex: \.xwd
  - regex: \-out
  - regex: \.xwd
false_positives:
- Legitimate use of screenshot utility
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_screencaputre_xwd.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1113/T1113.md#atomic-test-3---x-windows-capture,
  https://linux.die.net/man/1/xwd'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1113/T1113.md#atomic-test-3---x-windows-capture
- https://linux.die.net/man/1/xwd
tags:
- attack.collection
- attack.t1113
