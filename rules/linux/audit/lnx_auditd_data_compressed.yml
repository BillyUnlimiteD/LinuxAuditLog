id: SIGMA-LIN-DATA_COMPRESSED
title: Data Compressed
category: audit
subcategory: detection
mitre_technique: T1560.001
mitre_tactic: collection
severity: low
confidence: low
enabled: true
description: An adversary may compress data (e.g., sensitive documents) that is collected
  prior to exfiltration in order to make it portable and minimize the amount of data
  sent over the network.
service: auditd
detection:
  type: pattern
  patterns:
  - regex: execve
  - regex: execve
  - regex: gzip
  - regex: execve
false_positives:
- Legitimate use of archiving tools by legitimate user.
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_data_compressed.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/a78b9ed805ab9ea2e422e1aa7741e9407d82d7b1/atomics/T1560.001/T1560.001.md'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/a78b9ed805ab9ea2e422e1aa7741e9407d82d7b1/atomics/T1560.001/T1560.001.md
tags:
- attack.exfiltration
- attack.collection
- attack.t1560.001
