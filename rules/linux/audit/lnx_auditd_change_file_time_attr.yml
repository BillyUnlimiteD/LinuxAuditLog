id: SIGMA-LIN-FILE_TIME_ATTRIBUTE
title: File Time Attribute Change - Linux
category: audit
subcategory: detection
mitre_technique: T1070.006
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detect file time attribute change to hide new or changes to existing
  files.
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: touch
  - regex: \-acmr
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_change_file_time_attr.yml.
