id: SIGMA-LIN-SYSTEM_INFO_DISCOVER
title: System Info Discovery via Sysinfo Syscall
category: audit
subcategory: detection
mitre_technique: T1057
mitre_tactic: discovery
severity: low
confidence: low
enabled: true
description: 'Detects use of the sysinfo system call in Linux, which provides a snapshot
  of key system statistics such as uptime, load averages, memory usage, and the number
  of running processes.

  Malware or reconnaissance tools might leverage sysinfo to fingerprint the system
  - gathering data to determine if it''s a viable target.

  '
service: auditd
detection:
  type: pattern
  patterns:
  - regex: SYSCALL
  - regex: sysinfo
  - regex: /bin/splunkd
false_positives:
- Legitimate administrative activity
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/syscall/lnx_auditd_susp_discovery_sysinfo_syscall.yml.
  References: https://github.com/CheraghiMilad/bypass-Neo23x0-auditd-config/blob/f1c478a37911a5447d5ffcd580f22b167bf3df14/sysinfo-syscall/README.md,
  https://man7.org/linux/man-pages/man2/sysinfo.2.html'
references:
- https://github.com/CheraghiMilad/bypass-Neo23x0-auditd-config/blob/f1c478a37911a5447d5ffcd580f22b167bf3df14/sysinfo-syscall/README.md
- https://man7.org/linux/man-pages/man2/sysinfo.2.html
tags:
- attack.discovery
- attack.t1057
- attack.t1082
