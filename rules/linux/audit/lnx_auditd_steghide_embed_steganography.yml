id: SIGMA-LIN-STEGANOGRAPHY_HIDE_F
title: Steganography Hide Files with Steghide
category: audit
subcategory: detection
mitre_technique: T1027.003
mitre_tactic: ''
severity: low
confidence: low
enabled: true
description: Detects embedding of files with usage of steghide binary, the adversaries
  may use this technique to prevent the detection of hidden information.
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: steghide
  - regex: embed
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_steghide_embed_steganography.yml.
