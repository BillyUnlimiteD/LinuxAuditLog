id: SIGMA-LIN-REMOVE_IMMUTABLE_FIL
title: Remove Immutable File Attribute - Auditd
category: audit
subcategory: detection
mitre_technique: T1222.002
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects removing immutable file attribute.
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: chattr
false_positives:
- Administrator interacting with immutable files (e.g. for instance backups).
