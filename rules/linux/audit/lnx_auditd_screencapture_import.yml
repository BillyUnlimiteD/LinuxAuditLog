id: SIGMA-LIN-SCREEN_CAPTURE_WITH
title: Screen Capture with Import Tool
category: audit
subcategory: detection
mitre_technique: T1113
mitre_tactic: collection
severity: low
confidence: low
enabled: true
description: 'Detects adversary creating screen capture of a desktop with Import Tool.

  Highly recommended using rule on servers, due to high usage of screenshot utilities
  on user workstations.

  ImageMagick must be installed.

  '
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: import
  - regex: \-window
  - regex: root
  - regex: \.png
  - regex: \.jpg
  - regex: \.jpeg
  - regex: \.png
  - regex: \.jpg
  - regex: \.jpeg
false_positives:
- Legitimate use of screenshot utility
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_screencapture_import.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1113/T1113.md,
  https://linux.die.net/man/1/import, https://imagemagick.org/'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1113/T1113.md
- https://linux.die.net/man/1/import
- https://imagemagick.org/
tags:
- attack.collection
- attack.t1113
_sigma_source: rules/linux/auditd/execve/lnx_auditd_screencapture_import.yml
_sigma_status: test
_sigma_author: Pawel Mazur
_sigma_date: 2021-09-21
