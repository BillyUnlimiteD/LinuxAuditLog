id: SIGMA-LIN-PASSWORD_POLICY_DISC
title: Password Policy Discovery - Linux
category: audit
subcategory: brute_force
mitre_technique: T1201
mitre_tactic: discovery
severity: low
confidence: low
enabled: true
description: Detects password policy discovery commands
service: auditd
detection:
  type: pattern
  patterns:
  - regex: PATH
  - regex: /etc/login\.defs
  - regex: /etc/pam\.d/auth
  - regex: /etc/pam\.d/common\-account
  - regex: /etc/pam\.d/common\-auth
  - regex: /etc/pam\.d/common\-password
  - regex: /etc/pam\.d/system\-auth
  - regex: /etc/security/pwquality\.conf
  - regex: EXECVE
  - regex: chage
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/lnx_auditd_password_policy_discovery.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1201/T1201.md,
  https://linux.die.net/man/1/chage, https://man7.org/linux/man-pages/man1/passwd.1.html,
  https://superuser.com/questions/150675/how-to-display-password-policy-information-for-a-user-ubuntu'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1201/T1201.md
- https://linux.die.net/man/1/chage
- https://man7.org/linux/man-pages/man1/passwd.1.html
- https://superuser.com/questions/150675/how-to-display-password-policy-information-for-a-user-ubuntu
tags:
- attack.discovery
- attack.t1201
