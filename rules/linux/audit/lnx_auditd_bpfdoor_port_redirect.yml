id: SIGMA-LIN-BPFDOOR_TCP_PORTS_RE
title: Bpfdoor TCP Ports Redirect
category: audit
subcategory: detection
mitre_technique: T1562.004
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: 'All TCP traffic on particular port from attacker is routed to different
  port. ex. ''/sbin/iptables -t nat -D PREROUTING -p tcp -s 192.168.1.1 --dport 22
  -j REDIRECT --to-ports 42392''

  The traffic looks like encrypted SSH communications going to TCP port 22, but in
  reality is being directed to the shell port once it hits the iptables rule for the
  attacker host only.

  '
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: iptables
  - regex: \-\-to\-ports\ 42
  - regex: \-\-to\-ports\ 43
false_positives:
- Legitimate ports redirect
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_bpfdoor_port_redirect.yml.
  References: https://www.sandflysecurity.com/blog/bpfdoor-an-evasive-linux-backdoor-technical-analysis/,
  https://www.elastic.co/security-labs/a-peek-behind-the-bpfdoor'
references:
- https://www.sandflysecurity.com/blog/bpfdoor-an-evasive-linux-backdoor-technical-analysis/
- https://www.elastic.co/security-labs/a-peek-behind-the-bpfdoor
tags:
- attack.defense-evasion
- attack.t1562.004
_sigma_source: rules/linux/auditd/execve/lnx_auditd_bpfdoor_port_redirect.yml
_sigma_status: test
_sigma_author: Rafal Piasecki
