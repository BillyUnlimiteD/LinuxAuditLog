id: SIGMA-LIN-BINARY_PADDING___LIN
title: Binary Padding - Linux
category: audit
subcategory: detection
mitre_technique: T1027.001
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: 'Adversaries may use binary padding to add junk data and change the on-disk
  representation of malware.

  This rule detect using dd and truncate to add a junk data to file.

  '
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: truncate
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_binary_padding.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1027.001/T1027.001.md'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1027.001/T1027.001.md
tags:
- attack.defense-evasion
- attack.t1027.001
