id: SIGMA-LIN-SUSPICIOUS_COMMANDS
title: Suspicious Commands Linux
category: audit
subcategory: execution
mitre_technique: T1059.004
mitre_tactic: execution
severity: medium
confidence: low
enabled: true
description: Detects relevant commands often related to malware or hacking activity
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: chmod
  - regex: EXECVE
  - regex: chmod
  - regex: EXECVE
  - regex: /bin/ksh
  - regex: EXECVE
  - regex: /bin/sh
false_positives:
- Admin activity
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/execve/lnx_auditd_susp_cmds.yml.
  References: Internal Research - mostly derived from exploit code including code
  in MSF'
references:
- Internal Research - mostly derived from exploit code including code in MSF
tags:
- attack.execution
- attack.t1059.004
