id: SIGMA-LIN-AUDIO_CAPTURE
title: Audio Capture
category: audit
subcategory: detection
mitre_technique: T1123
mitre_tactic: collection
severity: low
confidence: low
enabled: true
description: Detects attempts to record audio using the arecord and ecasound utilities.
service: auditd
detection:
  type: pattern
  patterns:
  - regex: EXECVE
  - regex: arecord
  - regex: \-fdat
  - regex: SYSCALL
  - regex: /ecasound
  - regex: memfd_create
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/lnx_auditd_audio_capture.yml.
  References: https://linux.die.net/man/1/arecord, https://linuxconfig.org/how-to-test-microphone-with-audio-linux-sound-architecture-alsa,
  https://manpages.debian.org/unstable/ecasound/ecasound.1.en.html, https://ecasound.seul.org/ecasound/Documentation/examples.html#fconversions'
references:
- https://linux.die.net/man/1/arecord
- https://linuxconfig.org/how-to-test-microphone-with-audio-linux-sound-architecture-alsa
- https://manpages.debian.org/unstable/ecasound/ecasound.1.en.html
- https://ecasound.seul.org/ecasound/Documentation/examples.html#fconversions
tags:
- attack.collection
- attack.t1123
_sigma_source: rules/linux/auditd/lnx_auditd_audio_capture.yml
_sigma_status: test
_sigma_author: Pawel Mazur, Milad Cheraghi
_sigma_date: 2021-09-04
