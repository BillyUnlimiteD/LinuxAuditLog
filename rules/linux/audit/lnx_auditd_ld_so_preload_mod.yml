id: SIGMA-LIN-MODIFICATION_OF_LD_S
title: Modification of ld.so.preload
category: audit
subcategory: detection
mitre_technique: T1574.006
mitre_tactic: persistence
severity: high
confidence: low
enabled: true
description: Identifies modification of ld.so.preload for shared object injection.
  This technique is used by attackers to load arbitrary code into processes.
service: auditd
detection:
  type: pattern
  patterns:
  - regex: PATH
  - regex: /etc/ld\.so\.preload
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/auditd/path/lnx_auditd_ld_so_preload_mod.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1574.006/T1574.006.md,
  https://eqllib.readthedocs.io/en/latest/analytics/fd9b987a-1101-4ed3-bda6-a70300eaf57e.html'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1574.006/T1574.006.md
- https://eqllib.readthedocs.io/en/latest/analytics/fd9b987a-1101-4ed3-bda6-a70300eaf57e.html
tags:
- attack.privilege-escalation
- attack.persistence
- attack.defense-evasion
- attack.t1574.006
