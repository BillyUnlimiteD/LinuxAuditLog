id: SIGMA-LIN-SUSPICIOUS_FILENAME
title: Suspicious Filename with Embedded Base64 Commands
category: generic
subcategory: execution
mitre_technique: T1059.004
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: 'Detects files with specially crafted filenames that embed Base64-encoded
  bash payloads designed to execute when processed by shell scripts.

  These filenames exploit shell interpretation quirks to trigger hidden commands,
  a technique observed in VShell malware campaigns.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: \{echo
  - regex: \{base64,\-d\}
false_positives:
- Legitimate files with similar naming patterns (very unlikely).
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/file_event/file_event_lnx_susp_filename_with_embedded_base64_command.yml.
  References: https://www.trellix.com/blogs/research/the-silent-fileless-threat-of-vshell/'
references:
- https://www.trellix.com/blogs/research/the-silent-fileless-threat-of-vshell/
tags:
- attack.execution
- attack.t1059.004
- attack.defense-evasion
- attack.t1027
