id: SIGMA-LIN-WGET_CREATING_FILES
title: Wget Creating Files in Tmp Directory
category: generic
subcategory: detection
mitre_technique: T1105
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects the use of wget to download content in a temporary directory
  such as "/tmp" or "/var/tmp"
service: linux
detection:
  type: pattern
  patterns:
  - regex: /wget
  - regex: /tmp/
  - regex: /var/tmp/
false_positives:
- Legitimate downloads of files in the tmp folder.
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/file_event/file_event_lnx_wget_download_file_in_tmp_dir.yml.
  References: https://blogs.jpcert.or.jp/en/2023/05/gobrat.html, https://jstnk9.github.io/jstnk9/research/GobRAT-Malware/,
  https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection,
  https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection'
references:
- https://blogs.jpcert.or.jp/en/2023/05/gobrat.html
- https://jstnk9.github.io/jstnk9/research/GobRAT-Malware/
- https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection
- https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection
tags:
