id: LIN-AUTH-007
title: Automated Sudo Password Brute-Force
category: credential_access
subcategory: brute_force
mitre_technique: T1110.001
mitre_tactic: credential_access
severity: critical
confidence: high
enabled: true
description: >
  Detects automated brute-force attacks against the sudo password prompt from
  within an active user session. Unlike SSH brute-force (which targets the network),
  this attack originates from an already-authenticated unprivileged user who lacks
  sudo rights and is programmatically spawning sudo processes at high frequency
  to guess the password. Observed pattern: 70+ PAM authentication failures via
  sudo at sub-second intervals (< 0.5s gaps) within a single session.
  Source: confirmed in audit.log type=USER_AUTH events — 79 failures, 73 with
  gap < 0.5s, minimum gap 0.089s.
service: sudo
detection:
  type: pattern
  patterns:
    - regex: "type=USER_AUTH.*exe=\"/usr/bin/sudo\".*res=failed"
    - regex: "sudo:.*pam_unix.*authentication failure.*user=(?P<user>\\S+)"
    - regex: "PAM.*authentication.*failure.*sudo.*acct=\"(?P<user>[^\"]+)\""
    - regex: "sudo: (?P<user>\\S+) : \\d+ incorrect password attempt"
false_positives:
  - User repeatedly mistyping their own sudo password (low rate, < 3 attempts)
  - Automation scripts with misconfigured credentials (but rate will still be suspicious)
recommendation: >
  1. Lock the account immediately: passwd -l <user>
  2. Review all USER_CMD events for the user's session to identify what commands
     were attempted via sudo (may reveal reconnaissance intent).
  3. Check if sudo privilege was eventually obtained via other means (CVE, SUID binary).
  4. Audit /etc/sudoers and /etc/sudoers.d/ for unauthorized modifications.
  5. Implement pam_faillock (faillock) or pam_tally2 with a low threshold (3-5 attempts)
     to automatically lock accounts after repeated sudo failures.
  6. Consider configuring sudo with 'Defaults passwd_tries=3' to limit retries per invocation.
references:
  - "https://attack.mitre.org/techniques/T1110/001/"
  - "https://linux.die.net/man/8/pam_faillock"
  - "https://man7.org/linux/man-pages/man8/visudo.8.html"
tags:
  - sudo
  - brute_force
  - credential_access
  - pam
  - automated_attack
