id: LIN-AUTH-008
title: Plaintext Credentials in Command-Line Arguments
category: credential_access
subcategory: credential_exposure
mitre_technique: T1552.003
mitre_tactic: credential_access
severity: high
confidence: high
enabled: true
description: >
  Detects plaintext credentials passed as command-line arguments, which are
  captured verbatim by auditd USER_CMD events and visible to any user who can
  read the audit log or run 'ps'. Common patterns: -p <password>, --password=,
  -o password=, CIFS/SMB mounts with embedded credentials.
  Observed in this environment: on 2025-01-20, 'adminsis' ran:
    mount -t cifs -o username=gserrano,password=**** //146.155.10.34/home /mnt
  The full credential including password is permanently stored in audit.log.
service: "*"
detection:
  type: pattern
  patterns:
    - regex: "cmd=.*(?:-p\\s+\\S+|--password[= ]\\S+|password=[^,\\s]+)"
    - regex: "mount.*-o.*password=(?P<credential>[^,\\s]+)"
    - regex: "\\bmysql\\s+.*-p(?P<password>\\S{4,})|\\bmysqladmin\\s+.*-p(?P<password2>\\S{4,})"
    - regex: "smbclient.*-U\\s+\\S+%(?P<password>\\S+)|smbmount.*password=(?P<password2>\\S+)"
    - regex: "USER_CMD.*cmd=.*(?:password|passwd|secret|token|key)=[^\\s&\"']{4,}"
false_positives:
  - Applications that only accept credentials via command line by design (legacy software)
  - Automated scripts using environment variable substitution (value may be masked)
recommendation: >
  1. Rotate the exposed credential immediately: the user 'gserrano' CIFS password
     The exposed credential is permanently recorded in audit.log — rotate it.
  2. Enforce credential passing via config files with restricted permissions (chmod 600)
     or via environment variables rather than command-line arguments.
  3. For CIFS mounts, use /etc/fstab with credentials= pointing to a protected file:
       //server/share /mnt cifs credentials=/root/.smbcredentials 0 0
  4. Purge or restrict access to audit logs containing the exposed credential.
  5. Audit all hosts that mount shares from //146.155.10.34 for credential reuse.
     (The exposed credential is recorded in audit.log — rotate it if not already done.)
references:
  - "https://attack.mitre.org/techniques/T1552/003/"
  - "https://man7.org/linux/man-pages/man8/mount.cifs.8.html"
  - "https://www.freedesktop.org/wiki/Software/smbclient/"
tags:
  - credentials
  - plaintext
  - command_line
  - audit_log
  - cifs
  - credential_exposure
