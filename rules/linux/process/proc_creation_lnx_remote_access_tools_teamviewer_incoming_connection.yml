id: SIGMA-LIN-REMOTE_ACCESS_TOOL
title: Remote Access Tool - Team Viewer Session Started On Linux Host
category: process
subcategory: detection
mitre_technique: T1133
mitre_tactic: persistence
severity: low
confidence: low
enabled: true
description: 'Detects the command line executed when TeamViewer starts a session started
  by a remote host.

  Once a connection has been started, an investigator can verify the connection details
  by viewing the "incoming_connections.txt" log file in the TeamViewer folder.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: /TeamViewer_Service
  - regex: /TeamViewer_Desktop
  - regex: /TeamViewer_Desktop\ \-\-IPCport\ 5939\ \-\-Module\ 1
false_positives:
- Legitimate usage of TeamViewer
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_remote_access_tools_teamviewer_incoming_connection.yml.
  References: Internal Research'
references:
- Internal Research
tags:
- attack.persistence
- attack.initial-access
- attack.t1133
_sigma_source: rules/linux/process_creation/proc_creation_lnx_remote_access_tools_teamviewer_incoming_connection.yml
_sigma_status: test
_sigma_author: Josh Nickels, Qi Nan
_sigma_date: 2024-03-11
