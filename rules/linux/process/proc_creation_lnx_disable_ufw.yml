id: SIGMA-LIN-UFW_FORCE_STOP_USING
title: Ufw Force Stop Using Ufw-Init
category: process
subcategory: detection
mitre_technique: T1562.004
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects attempts to force stop the ufw using ufw-init
service: linux
detection:
