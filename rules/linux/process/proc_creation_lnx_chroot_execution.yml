id: SIGMA-LIN-LINUX_SUDO_CHROOT_EX
title: Linux Sudo Chroot Execution
category: process
subcategory: execution
mitre_technique: T1068
mitre_tactic: ''
severity: low
confidence: low
enabled: true
description: 'Detects the execution of ''sudo'' command with ''--chroot'' option,
  which is used to change the root directory for command execution.

  Attackers may use this technique to evade detection and execute commands in a modified
  environment.

  This can be part of a privilege escalation strategy, as it allows the execution
  of commands with elevated privileges in a controlled environment as seen in CVE-2025-32463.

  While investigating, look out for unusual or unexpected use of ''sudo --chroot''
  in conjunction with other comma'
service: linux
detection:
  type: pattern
  patterns:
  - regex: /sudo
  - regex: '\ \-\-chroot\ '
  - regex: 'sudo\ \-R\ '
false_positives:
- Legitimate administrative tasks or scripts that use 'sudo --chroot' for containerization,
  testing, or system management.
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_chroot_execution.yml.
  References: https://github.com/kh4sh3i/CVE-2025-32463/blob/81bb430f84fa2089224733c3ed4bfa434c197ad4/exploit.sh'
references:
- https://github.com/kh4sh3i/CVE-2025-32463/blob/81bb430f84fa2089224733c3ed4bfa434c197ad4/exploit.sh
tags:
- attack.privilege-escalation
- attack.t1068
