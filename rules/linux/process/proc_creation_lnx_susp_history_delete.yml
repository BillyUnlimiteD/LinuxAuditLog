id: SIGMA-LIN-HISTORY_FILE_DELETIO
title: History File Deletion
category: process
subcategory: detection
mitre_technique: T1565.001
mitre_tactic: impact
severity: high
confidence: low
enabled: true
description: Detects events in which a history file gets deleted, e.g. the ~/bash_history
  to remove traces of malicious activity
service: linux
detection:
  type: pattern
  patterns:
  - regex: /unlink
  - regex: /shred
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_history_delete.yml.
  References: https://github.com/sleventyeleven/linuxprivchecker/, https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1552.003/T1552.003.md'
references:
- https://github.com/sleventyeleven/linuxprivchecker/
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1552.003/T1552.003.md
tags:
- attack.impact
- attack.t1565.001
