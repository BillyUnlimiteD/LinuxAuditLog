id: SIGMA-LIN-SHELL_INVOCATION_VIA
title: Shell Invocation via Env Command - Linux
category: process
subcategory: execution
mitre_technique: T1059
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: 'Detects the use of the env command to invoke a shell. This may indicate
  an attempt to bypass restricted environments, escalate privileges, or execute arbitrary
  commands.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: /env
  - regex: /bin/bash
  - regex: /bin/dash
  - regex: /bin/fish
  - regex: /bin/sh
  - regex: /bin/zsh
false_positives:
- Github operations such as ghe-backup
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_env_shell_invocation.yml.
  References: https://gtfobins.github.io/gtfobins/env/#shell, https://www.elastic.co/guide/en/security/current/linux-restricted-shell-breakout-via-linux-binary-s.html'
references:
- https://gtfobins.github.io/gtfobins/env/#shell
- https://www.elastic.co/guide/en/security/current/linux-restricted-shell-breakout-via-linux-binary-s.html
tags:
- attack.execution
- attack.t1059
_sigma_source: rules/linux/process_creation/proc_creation_lnx_env_shell_invocation.yml
_sigma_status: test
_sigma_author: Li Ling, Andy Parkidomo, Robert Rakowski, Blake Hartstein (Bloomberg
  L.P.)
_sigma_date: 2024-09-02
