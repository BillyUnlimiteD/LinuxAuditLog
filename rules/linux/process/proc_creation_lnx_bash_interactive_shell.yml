id: SIGMA-LIN-BASH_INTERACTIVE_SHE
title: Bash Interactive Shell
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: low
confidence: low
enabled: true
description: Detects execution of the bash shell with the interactive flag "-i".
service: linux
detection:
  type: pattern
  patterns:
  - regex: /bash
  - regex: '\ \-i\ '
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_bash_interactive_shell.yml.
  References: https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet,
  https://www.revshells.com/, https://linux.die.net/man/1/bash'
references:
- https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet
- https://www.revshells.com/
- https://linux.die.net/man/1/bash
tags:
- attack.execution
