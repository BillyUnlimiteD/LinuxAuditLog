id: SIGMA-LIN-PYTHON_REVERSE_SHELL
title: Python Reverse Shell Execution Via PTY And Socket Modules
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: 'Detects the execution of python with calls to the socket and pty module
  in order to connect and spawn a potential reverse shell.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: python
  - regex: '\ \-c\ '
  - regex: import
  - regex: socket
  - regex: spawn
  - regex: \.connect
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_python_reverse_shell.yml.
  References: https://www.revshells.com/'
references:
- https://www.revshells.com/
tags:
- attack.execution
_sigma_source: rules/linux/process_creation/proc_creation_lnx_python_reverse_shell.yml
_sigma_status: test
_sigma_author: '@d4ns4n_, Nasreddine Bencherchali (Nextron Systems)'
_sigma_date: 2023-04-24
