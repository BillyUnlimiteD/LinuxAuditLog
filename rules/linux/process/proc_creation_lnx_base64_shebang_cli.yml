id: SIGMA-LIN-LINUX_BASE___ENCODED
title: Linux Base64 Encoded Shebang In CLI
category: process
subcategory: detection
mitre_technique: T1140
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects the presence of a base64 version of the shebang in the commandline,
  which could indicate a malicious payload about to be decoded
service: linux
detection:
  type: pattern
  patterns:
  - regex: IyEvYmluL2Jhc2
  - regex: IyEvYmluL2Rhc2
  - regex: IyEvYmluL3pza
  - regex: IyEvYmluL2Zpc2
  - regex: IyEvYmluL3No
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_base64_shebang_cli.yml.
  References: https://www.trendmicro.com/pl_pl/research/20/i/the-evolution-of-malicious-shell-scripts.html,
  https://github.com/carlospolop/PEASS-ng/tree/master/linPEAS'
references:
- https://www.trendmicro.com/pl_pl/research/20/i/the-evolution-of-malicious-shell-scripts.html
- https://github.com/carlospolop/PEASS-ng/tree/master/linPEAS
tags:
- attack.defense-evasion
- attack.t1140
_sigma_source: rules/linux/process_creation/proc_creation_lnx_base64_shebang_cli.yml
_sigma_status: test
_sigma_author: Nasreddine Bencherchali (Nextron Systems)
_sigma_date: 2022-09-15
