id: SIGMA-LIN-SHELL_EXECUTION_OF_P
title: Shell Execution Of Process Located In Tmp Directory
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: Detects execution of shells from a parent process located in a temporary
  (/tmp) directory
service: linux
detection:
  type: pattern
  patterns:
  - regex: /tmp/
  - regex: /bash
  - regex: /csh
  - regex: /dash
  - regex: /fish
  - regex: /ksh
  - regex: /zsh
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_shell_child_process_from_parent_tmp_folder.yml.
  References: https://blogs.jpcert.or.jp/en/2023/05/gobrat.html, https://jstnk9.github.io/jstnk9/research/GobRAT-Malware/,
  https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection,
  https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection'
references:
- https://blogs.jpcert.or.jp/en/2023/05/gobrat.html
- https://jstnk9.github.io/jstnk9/research/GobRAT-Malware/
- https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection
- https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection
tags:
- attack.execution
