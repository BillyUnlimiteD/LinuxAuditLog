id: SIGMA-LIN-CHMOD_SUSPICIOUS_DIR
title: Chmod Suspicious Directory
category: process
subcategory: detection
mitre_technique: T1222.002
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects chmod targeting files in abnormal directory paths.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /chmod
  - regex: /tmp/
  - regex: /\.Library/
  - regex: /etc/
  - regex: /opt/
false_positives:
- Admin changing file permissions.
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_chmod_directories.yml.
  References: https://www.intezer.com/blog/malware-analysis/new-backdoor-sysjoker/,
  https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1222.002/T1222.002.md'
references:
- https://www.intezer.com/blog/malware-analysis/new-backdoor-sysjoker/
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1222.002/T1222.002.md
