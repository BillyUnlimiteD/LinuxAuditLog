id: SIGMA-LIN-ESXI_VM_KILL_VIA_ESX
title: ESXi VM Kill Via ESXCLI
category: process
subcategory: detection
mitre_technique: T1059.012
mitre_tactic: impact
severity: medium
confidence: low
enabled: true
description: Detects execution of the "esxcli" command with the "vm" and "kill" flag
  in order to kill/shutdown a specific VM.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /esxcli
  - regex: vm\ process
  - regex: kill
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_esxcli_vm_kill.yml.
  References: https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/,
  https://developer.broadcom.com/xapis/esxcli-command-reference/7.0.0/namespace/esxcli_vm.html,
  https://www.secuinfra.com/en/techtalk/hide-your-hypervisor-analysis-of-esxiargs-ransomware/,
  https://www.trendmicro.com/en_us/research/22/e/new-linux-based-ransomware-cheerscrypt-targets-exsi-devices.html'
references:
- https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/
- https://developer.broadcom.com/xapis/esxcli-command-reference/7.0.0/namespace/esxcli_vm.html
- https://www.secuinfra.com/en/techtalk/hide-your-hypervisor-analysis-of-esxiargs-ransomware/
- https://www.trendmicro.com/en_us/research/22/e/new-linux-based-ransomware-cheerscrypt-targets-exsi-devices.html
tags:
- attack.execution
- attack.impact
- attack.t1059.012
- attack.t1529
