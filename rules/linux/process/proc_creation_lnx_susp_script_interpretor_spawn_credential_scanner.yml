id: SIGMA-LIN-SCRIPT_INTERPRETER_S
title: Script Interpreter Spawning Credential Scanner - Linux
category: process
subcategory: detection
mitre_technique: T1552
mitre_tactic: collection
severity: high
confidence: low
enabled: true
description: 'Detects a script interpreter process (like node.js or bun) spawning
  a known credential scanning tool (e.g., trufflehog, gitleaks).

  This behavior is indicative of an attempt to find and steal secrets, as seen in
  the "Shai-Hulud: The Second Coming" campaign.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: /node
  - regex: /bun
false_positives:
- Legitimate pre-commit hooks or CI/CD pipeline jobs that use a script to run a credential
  scanner as part of a security check.
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_script_interpretor_spawn_credential_scanner.yml.
  References: https://github.com/asyncapi/cli/blob/2efa4dff59bc3d3cecdf897ccf178f99b115d63d/bun_environment.js,
  https://www.stepsecurity.io/blog/sha1-hulud-the-second-coming-zapier-ens-domains-and-other-prominent-npm-packages-compromised,
  https://www.endorlabs.com/learn/shai-hulud-2-malware-campaign-targets-github-and-cloud-credentials-using-bun-runtime,
  https://semgrep.dev/blog/2025/digging-for-secrets-sha1-hulud-the-second-coming-of-the-npm-worm/'
references:
- https://github.com/asyncapi/cli/blob/2efa4dff59bc3d3cecdf897ccf178f99b115d63d/bun_environment.js
- https://www.stepsecurity.io/blog/sha1-hulud-the-second-coming-zapier-ens-domains-and-other-prominent-npm-packages-compromised
- https://www.endorlabs.com/learn/shai-hulud-2-malware-campaign-targets-github-and-cloud-credentials-using-bun-runtime
- https://semgrep.dev/blog/2025/digging-for-secrets-sha1-hulud-the-second-coming-of-the-npm-worm/
