id: SIGMA-LIN-LINUX_CRYPTO_MINING
title: Linux Crypto Mining Indicators
category: process
subcategory: detection
mitre_technique: T1496
mitre_tactic: impact
severity: high
confidence: low
enabled: true
description: Detects command line parameters or strings often used by crypto miners
service: linux
detection:
  type: pattern
  patterns:
  - regex: \ \-\-cpu\-priority=
  - regex: \-\-donate\-level=0
  - regex: \ \-o\ pool\.
  - regex: \ \-\-nicehash
  - regex: '\ \-\-algo=rx/0\ '
  - regex: stratum\+tcp://
  - regex: stratum\+udp://
  - regex: sh\ \-c\ /sbin/modprobe\ msr\ allow_writes=on
  - regex: LS1kb25hdGUtbGV2ZWw9
  - regex: 0tZG9uYXRlLWxldmVsP
false_positives:
- Legitimate use of crypto miners
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_crypto_mining.yml.
  References: https://www.poolwatch.io/coin/monero'
references:
- https://www.poolwatch.io/coin/monero
tags:
- attack.impact
- attack.t1496
_sigma_source: rules/linux/process_creation/proc_creation_lnx_crypto_mining.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2021-10-26
