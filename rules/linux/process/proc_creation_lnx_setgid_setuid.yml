id: SIGMA-LIN-SETUID_AND_SETGID
title: Setuid and Setgid
category: process
subcategory: detection
mitre_technique: T1548.001
mitre_tactic: persistence
severity: low
confidence: low
enabled: true
description: Detects suspicious change of file privileges with chown and chmod commands
service: linux
detection:
  type: pattern
  patterns:
  - regex: chown\ root
  - regex: \ chmod\ u\+s
  - regex: \ chmod\ g\+s
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_setgid_setuid.yml.
