id: SIGMA-LIN-POTENTIAL_PERL_REVER
title: Potential Perl Reverse Shell Execution
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: Detects execution of the perl binary with the "-e" flag and common strings
  related to potential reverse shell activity
service: linux
detection:
  type: pattern
  patterns:
  - regex: /perl
  - regex: '\ \-e\ '
false_positives:
- Unlikely
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_perl_reverse_shell.yml.
  References: https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet,
  https://www.revshells.com/'
references:
- https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet
- https://www.revshells.com/
tags:
- attack.execution
