id: SIGMA-LIN-MOUNT_EXECUTION_WITH
title: Mount Execution With Hidepid Parameter
category: process
subcategory: execution
mitre_technique: T1564
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects execution of the "mount" command with "hidepid" parameter to
  make invisible processes to other users from the system
service: linux
detection:
  type: pattern
  patterns:
  - regex: /mount
  - regex: hidepid=2
  - regex: '\ \-o\ '
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_mount_hidepid.yml.
  References: https://blogs.blackberry.com/, https://www.cyberciti.biz/faq/linux-hide-processes-from-other-users/,
  https://twitter.com/Joseliyo_Jstnk/status/1620131033474822144'
references:
- https://blogs.blackberry.com/
- https://www.cyberciti.biz/faq/linux-hide-processes-from-other-users/
- https://twitter.com/Joseliyo_Jstnk/status/1620131033474822144
tags:
- attack.credential-access
- attack.defense-evasion
- attack.t1564
_sigma_source: rules/linux/process_creation/proc_creation_lnx_mount_hidepid.yml
_sigma_status: test
_sigma_author: Joseliyo Sanchez, @Joseliyo_Jstnk
_sigma_date: 2023-01-12
