id: SIGMA-LIN-EXECUTION_OF_SCRIPT
title: Execution Of Script Located In Potentially Suspicious Directory
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: medium
confidence: low
enabled: true
description: Detects executions of scripts located in potentially suspicious locations
  such as "/tmp" via a shell such as "bash", "sh", etc.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /bash
  - regex: /csh
  - regex: /dash
  - regex: /fish
  - regex: /ksh
  - regex: /zsh
  - regex: '\ \-c\ '
  - regex: /tmp/
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_shell_script_exec_from_susp_location.yml.
  References: https://blogs.jpcert.or.jp/en/2023/05/gobrat.html, https://jstnk9.github.io/jstnk9/research/GobRAT-Malware/,
  https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection,
  https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection'
references:
- https://blogs.jpcert.or.jp/en/2023/05/gobrat.html
- https://jstnk9.github.io/jstnk9/research/GobRAT-Malware/
- https://www.virustotal.com/gui/file/60bcd645450e4c846238cf0e7226dc40c84c96eba99f6b2cffcd0ab4a391c8b3/detection
- https://www.virustotal.com/gui/file/3e44c807a25a56f4068b5b8186eee5002eed6f26d665a8b791c472ad154585d1/detection
tags:
- attack.execution
