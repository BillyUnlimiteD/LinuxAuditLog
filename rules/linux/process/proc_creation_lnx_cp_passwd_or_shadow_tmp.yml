id: SIGMA-LIN-COPY_PASSWD_OR_SHADO
title: Copy Passwd Or Shadow From TMP Path
category: process
subcategory: detection
mitre_technique: T1552.001
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects when the file "passwd" or "shadow" is copied from tmp path
service: linux
detection:
  type: pattern
  patterns:
  - regex: /tmp/
  - regex: passwd
  - regex: shadow
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_cp_passwd_or_shadow_tmp.yml.
