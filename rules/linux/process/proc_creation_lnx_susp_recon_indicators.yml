id: SIGMA-LIN-LINUX_RECON_INDICATO
title: Linux Recon Indicators
category: process
subcategory: detection
mitre_technique: T1592.004
mitre_tactic: reconnaissance
severity: high
confidence: low
enabled: true
description: Detects events with patterns found in commands used for reconnaissance
  on linux systems
service: linux
detection:
  type: pattern
  patterns:
  - regex: \ \-name\ \.htpasswd
  - regex: '\ \-perm\ \-4000\ '
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_recon_indicators.yml.
  References: https://github.com/sleventyeleven/linuxprivchecker/blob/0d701080bbf92efd464e97d71a70f97c6f2cd658/linuxprivchecker.py'
references:
- https://github.com/sleventyeleven/linuxprivchecker/blob/0d701080bbf92efd464e97d71a70f97c6f2cd658/linuxprivchecker.py
tags:
- attack.reconnaissance
- attack.t1592.004
- attack.credential-access
- attack.t1552.001
_sigma_source: rules/linux/process_creation/proc_creation_lnx_susp_recon_indicators.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2022-06-20
