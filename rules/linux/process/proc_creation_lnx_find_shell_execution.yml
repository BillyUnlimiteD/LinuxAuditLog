id: SIGMA-LIN-SHELL_EXECUTION_VIA
title: Shell Execution via Find - Linux
category: process
subcategory: execution
mitre_technique: T1083
mitre_tactic: discovery
severity: high
confidence: low
enabled: true
description: 'Detects the use of the find command to execute a shell. Such behavior
  may be associated with privilege escalation, unauthorized command execution, or
  exploitation attempt.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: /find
  - regex: \-exec
  - regex: /bin/bash
  - regex: /bin/dash
  - regex: /bin/fish
  - regex: /bin/sh
  - regex: /bin/zsh
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_find_shell_execution.yml.
  References: https://gtfobins.github.io/gtfobins/find/#shell, https://www.elastic.co/guide/en/security/current/linux-restricted-shell-breakout-via-linux-binary-s.html'
references:
- https://gtfobins.github.io/gtfobins/find/#shell
- https://www.elastic.co/guide/en/security/current/linux-restricted-shell-breakout-via-linux-binary-s.html
tags:
- attack.discovery
- attack.t1083
_sigma_source: rules/linux/process_creation/proc_creation_lnx_find_shell_execution.yml
_sigma_status: test
_sigma_author: Li Ling, Andy Parkidomo, Robert Rakowski, Blake Hartstein (Bloomberg
  L.P.)
_sigma_date: 2024-09-02
