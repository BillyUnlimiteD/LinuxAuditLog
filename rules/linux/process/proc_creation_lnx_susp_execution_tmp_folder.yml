id: SIGMA-LIN-POTENTIALLY_SUSPICIO
title: Potentially Suspicious Execution From Tmp Folder
category: process
subcategory: execution
mitre_technique: T1036
mitre_tactic: ''
severity: medium
confidence: low
enabled: true
description: Detects a potentially suspicious execution of a process located in the
  '/tmp/' folder
service: linux
detection:
  type: pattern
  patterns:
  - regex: /tmp/
  - regex: /usr/bin/nextcloud
false_positives:
- Unknown
