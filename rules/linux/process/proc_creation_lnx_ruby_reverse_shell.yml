id: SIGMA-LIN-POTENTIAL_RUBY_REVER
title: Potential Ruby Reverse Shell
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: medium
confidence: low
enabled: true
description: Detects execution of ruby with the "-e" flag and calls to "socket" related
  functions. This could be an indication of a potential attempt to setup a reverse
  shell
service: linux
detection:
  type: pattern
  patterns:
  - regex: ruby
  - regex: rsocket
  - regex: TCPSocket
  - regex: \ ash
  - regex: \ bash
  - regex: \ bsh
  - regex: \ csh
  - regex: \ ksh
  - regex: \ pdksh
  - regex: \ tcsh
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_ruby_reverse_shell.yml.
  References: https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet,
  https://www.revshells.com/'
references:
- https://pentestmonkey.net/cheat-sheet/shells/reverse-shell-cheat-sheet
- https://www.revshells.com/
tags:
- attack.execution
_sigma_source: rules/linux/process_creation/proc_creation_lnx_ruby_reverse_shell.yml
_sigma_status: test
_sigma_author: '@d4ns4n_'
_sigma_date: 2023-04-07
