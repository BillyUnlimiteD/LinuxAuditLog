id: SIGMA-LIN-ESXI_VSAN_INFORMATIO
title: ESXi VSAN Information Discovery Via ESXCLI
category: process
subcategory: detection
mitre_technique: T1033
mitre_tactic: execution
severity: medium
confidence: low
enabled: true
description: Detects execution of the "esxcli" command with the "vsan" flag in order
  to retrieve information about virtual storage. Seen used by malware such as DarkSide.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /esxcli
  - regex: vsan
  - regex: \ get
  - regex: \ list
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_esxcli_vsan_discovery.yml.
  References: https://www.trendmicro.com/en_us/research/21/e/darkside-linux-vms-targeted.html,
  https://www.trendmicro.com/en_us/research/22/a/analysis-and-Impact-of-lockbit-ransomwares-first-linux-and-vmware-esxi-variant.html,
  https://developer.broadcom.com/xapis/esxcli-command-reference/7.0.0/namespace/esxcli_vsan.html'
references:
- https://www.trendmicro.com/en_us/research/21/e/darkside-linux-vms-targeted.html
- https://www.trendmicro.com/en_us/research/22/a/analysis-and-Impact-of-lockbit-ransomwares-first-linux-and-vmware-esxi-variant.html
- https://developer.broadcom.com/xapis/esxcli-command-reference/7.0.0/namespace/esxcli_vsan.html
tags:
- attack.discovery
- attack.execution
- attack.t1033
- attack.t1007
- attack.t1059.012
