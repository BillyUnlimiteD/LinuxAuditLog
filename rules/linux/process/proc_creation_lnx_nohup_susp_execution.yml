id: SIGMA-LIN-SUSPICIOUS_NOHUP_EXE
title: Suspicious Nohup Execution
category: process
subcategory: execution
mitre_technique: ''
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: Detects execution of binaries located in potentially suspicious locations
  via "nohup"
service: linux
detection:
  type: pattern
  patterns:
  - regex: /nohup
  - regex: /tmp/
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_nohup_susp_execution.yml.
