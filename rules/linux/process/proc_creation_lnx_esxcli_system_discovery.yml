id: SIGMA-LIN-ESXI_SYSTEM_INFORMAT
title: ESXi System Information Discovery Via ESXCLI
category: process
subcategory: detection
mitre_technique: T1033
mitre_tactic: execution
severity: medium
confidence: low
enabled: true
description: Detects execution of the "esxcli" command with the "system" flag in order
  to retrieve information about the different component of the system. Such as accounts,
  modules, NTP, etc.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /esxcli
  - regex: system
  - regex: \ get
  - regex: \ list
false_positives:
- Legitimate administration activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_esxcli_system_discovery.yml.
  References: https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/,
  https://developer.broadcom.com/xapis/esxcli-command-reference/7.0.0/namespace/esxcli_system.html'
references:
- https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/
- https://developer.broadcom.com/xapis/esxcli-command-reference/7.0.0/namespace/esxcli_system.html
tags:
- attack.discovery
- attack.execution
- attack.t1033
- attack.t1007
- attack.t1059.012
_sigma_source: rules/linux/process_creation/proc_creation_lnx_esxcli_system_discovery.yml
_sigma_status: test
