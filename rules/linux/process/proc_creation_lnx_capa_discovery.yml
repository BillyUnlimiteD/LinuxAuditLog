id: SIGMA-LIN-CAPABILITIES_DISCOVE
title: Capabilities Discovery - Linux
category: process
subcategory: detection
mitre_technique: T1083
mitre_tactic: discovery
severity: low
confidence: low
enabled: true
description: Detects usage of "getcap" binary. This is often used during recon activity
  to determine potential binaries that can be abused as GTFOBins or other.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /getcap
  - regex: '\ \-r\ '
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_capa_discovery.yml.
  References: https://github.com/SaiSathvik1/Linux-Privilege-Escalation-Notes, https://github.com/carlospolop/PEASS-ng,
  https://github.com/diego-treitos/linux-smart-enumeration'
references:
- https://github.com/SaiSathvik1/Linux-Privilege-Escalation-Notes
- https://github.com/carlospolop/PEASS-ng
- https://github.com/diego-treitos/linux-smart-enumeration
tags:
- attack.discovery
- attack.t1083
_sigma_source: rules/linux/process_creation/proc_creation_lnx_capa_discovery.yml
_sigma_status: test
_sigma_author: Nasreddine Bencherchali (Nextron Systems)
_sigma_date: 2022-12-28
