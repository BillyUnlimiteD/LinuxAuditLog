id: SIGMA-LIN-SHELL_EXECUTION_VIA
title: Shell Execution via Git - Linux
category: process
subcategory: execution
mitre_technique: T1059
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: 'Detects the use of the "git" utility to execute a shell. Such behavior
  may be associated with privilege escalation, unauthorized command execution, or
  to break out from restricted environments.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: /git
  - regex: '\ \-p\ '
  - regex: help
  - regex: bash\ 0<\&1
  - regex: dash\ 0<\&1
  - regex: sh\ 0<\&1
false_positives:
- Unknown
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_git_shell_execution.yml.
  References: https://gtfobins.github.io/gtfobins/git/#shell'
references:
- https://gtfobins.github.io/gtfobins/git/#shell
tags:
- attack.execution
- attack.t1059
_sigma_source: rules/linux/process_creation/proc_creation_lnx_git_shell_execution.yml
_sigma_status: test
_sigma_author: Li Ling, Andy Parkidomo, Robert Rakowski, Blake Hartstein (Bloomberg
  L.P.)
_sigma_date: 2024-09-02
