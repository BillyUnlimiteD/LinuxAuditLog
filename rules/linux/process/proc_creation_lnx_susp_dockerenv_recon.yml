id: SIGMA-LIN-DOCKER_CONTAINER_DIS
title: Docker Container Discovery Via Dockerenv Listing
category: process
subcategory: detection
mitre_technique: T1082
mitre_tactic: discovery
severity: low
confidence: low
enabled: true
description: Detects listing or file reading of ".dockerenv" which can be a sing of
  potential container discovery
service: linux
detection:
  type: pattern
  patterns:
  - regex: /cat
  - regex: /dir
  - regex: /find
  - regex: /stat
  - regex: /test
  - regex: grep
  - regex: \.dockerenv
false_positives:
- Legitimate system administrator usage of these commands
- Some container tools or deployments may use these techniques natively to determine
  how they proceed with execution, and will need to be filtered
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_dockerenv_recon.yml.
  References: https://blog.skyplabs.net/posts/container-detection/, https://stackoverflow.com/questions/20010199/how-to-determine-if-a-process-runs-inside-lxc-docker'
references:
- https://blog.skyplabs.net/posts/container-detection/
- https://stackoverflow.com/questions/20010199/how-to-determine-if-a-process-runs-inside-lxc-docker
tags:
- attack.discovery
- attack.t1082
_sigma_source: rules/linux/process_creation/proc_creation_lnx_susp_dockerenv_recon.yml
_sigma_status: test
_sigma_author: Seth Hanford
_sigma_date: 2023-08-23
