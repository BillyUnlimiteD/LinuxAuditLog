id: SIGMA-LIN-LINUX_HACKTOOL_EXECU
title: Linux HackTool Execution
category: process
subcategory: execution
mitre_technique: T1587
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: Detects known hacktool execution based on image name.
service: linux
detection:
  type: pattern
  patterns:
  - regex: /crackmapexec
  - regex: /havoc
  - regex: /merlin\-agent
  - regex: /merlinServer\-Linux\-x64
  - regex: /msfconsole
  - regex: /msfvenom
  - regex: /ps\-empire\ server
  - regex: /ps\-empire
  - regex: /sliver\-client
  - regex: /sliver\-server
false_positives:
- Unlikely
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_susp_hktl_execution.yml.
  References: https://github.com/Gui774ume/ebpfkit, https://github.com/pathtofile/bad-bpf,
  https://github.com/carlospolop/PEASS-ng, https://github.com/t3l3machus/hoaxshell,
  https://github.com/t3l3machus/Villain, https://github.com/HavocFramework/Havoc,
  https://github.com/1N3/Sn1per, https://github.com/Ne0nd0g/merlin, https://github.com/Pennyw0rth/NetExec/'
