id: SIGMA-LIN-OMIGOD_SCX_RUNASPROV
title: OMIGOD SCX RunAsProvider ExecuteScript
category: process
subcategory: execution
mitre_technique: T1068
mitre_tactic: execution
severity: high
confidence: low
enabled: true
description: 'Rule to detect the use of the SCX RunAsProvider ExecuteScript to execute
  any UNIX/Linux script using the /bin/sh shell.

  Script being executed gets created as a temp file in /tmp folder with a scx* prefix.

  Then it is invoked from the following directory /etc/opt/microsoft/scx/conf/tmpdir/.

  The file in that directory has the same prefix scx*. SCXcore, started as the Microsoft
  Operations Manager UNIX/Linux Agent, is now used in a host of products including

  Microsoft Operations Manager, Microsoft Azure, and Mic'
service: linux
detection:
  type: pattern
  patterns:
  - regex: root
  - regex: /var/opt/microsoft/scx/tmp
  - regex: /etc/opt/microsoft/scx/conf/tmpdir/scx
false_positives:
- Legitimate use of SCX RunAsProvider ExecuteScript.
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_omigod_scx_runasprovider_executescript.yml.
  References: https://www.wiz.io/blog/omigod-critical-vulnerabilities-in-omi-azure,
  https://github.com/Azure/Azure-Sentinel/pull/3059'
references:
- https://www.wiz.io/blog/omigod-critical-vulnerabilities-in-omi-azure
- https://github.com/Azure/Azure-Sentinel/pull/3059
tags:
