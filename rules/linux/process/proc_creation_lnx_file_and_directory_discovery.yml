id: SIGMA-LIN-FILE_AND_DIRECTORY_D
title: File and Directory Discovery - Linux
category: process
subcategory: detection
mitre_technique: T1083
mitre_tactic: discovery
severity: info
confidence: low
enabled: true
description: 'Detects usage of system utilities such as "find", "tree", "findmnt",
  etc, to discover files, directories and network shares.

  '
service: linux
detection:
  type: pattern
  patterns:
  - regex: /file
  - regex: \(\.\)\{200,\}
  - regex: /find
  - regex: /tree
  - regex: /findmnt
  - regex: /mlocate
false_positives:
- Legitimate activities
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/process_creation/proc_creation_lnx_file_and_directory_discovery.yml.
  References: https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1083/T1083.md'
references:
- https://github.com/redcanaryco/atomic-red-team/blob/f339e7da7d05f6057fdfcdd3742bfcf365fee2a9/atomics/T1083/T1083.md
tags:
- attack.discovery
- attack.t1083
