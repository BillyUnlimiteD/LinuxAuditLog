id: SIGMA-LIN-BUFFER_OVERFLOW_ATTE
title: Buffer Overflow Attempts
category: authentication
subcategory: detection
mitre_technique: T1068
mitre_tactic: ''
severity: high
confidence: low
enabled: true
description: Detects buffer overflow attempts in Unix system log files
service: linux
detection:
  type: pattern
  patterns:
  - regex: attempt\ to\ execute\ code\ on\ stack\ by
  - regex: 0bin0sh1
  - regex: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
  - regex: stack\ smashing\ detected
false_positives:
- Base64 encoded data in log entries
recommendation: 'Review the activity matching this rule. Original Sigma rule: rules/linux/builtin/lnx_buffer_overflows.yml.
  References: https://github.com/ossec/ossec-hids/blob/1ecffb1b884607cb12e619f9ab3c04f530801083/etc/rules/attack_rules.xml,
  https://docs.oracle.com/cd/E19683-01/816-4883/6mb2joatd/index.html, https://www.giac.org/paper/gcih/266/review-ftp-protocol-cyber-defense-initiative/102802,
  https://blu.org/mhonarc/discuss/2001/04/msg00285.php, https://rapid7.com/blog/post/2019/02/19/stack-based-buffer-overflow-attacks-what-you-need-to-know/'
references:
- https://github.com/ossec/ossec-hids/blob/1ecffb1b884607cb12e619f9ab3c04f530801083/etc/rules/attack_rules.xml
- https://docs.oracle.com/cd/E19683-01/816-4883/6mb2joatd/index.html
- https://www.giac.org/paper/gcih/266/review-ftp-protocol-cyber-defense-initiative/102802
- https://blu.org/mhonarc/discuss/2001/04/msg00285.php
- https://rapid7.com/blog/post/2019/02/19/stack-based-buffer-overflow-attacks-what-you-need-to-know/
tags:
- attack.t1068
- attack.privilege-escalation
_sigma_source: rules/linux/builtin/lnx_buffer_overflows.yml
_sigma_status: test
_sigma_author: Florian Roth (Nextron Systems)
_sigma_date: 2017-03-01
